version: 2

models:
  - name: stg_github_events
    description: "Staged GitHub events with cleaned and normalized fields"
    columns:
      - name: event_id
        description: "Unique identifier for the event"
        tests:
          - not_null
      - name: event_type
        description: "Type of GitHub event (e.g., PushEvent, PullRequestEvent)"
        tests:
          - not_null
      - name: actor_login
        description: "GitHub username of the actor"
        tests:
          - not_null
      - name: repo_name
        description: "Full repository name (owner/repo)"
        tests:
          - not_null
      - name: created_at
        description: "Timestamp when the event occurred"
        tests:
          - not_null
      - name: event_date
        description: "Date partition (derived from created_at)"
        tests:
          - not_null
      - name: is_valid_event
        description: "Data quality flag indicating valid event"

  - name: daily_stats
    description: "Daily aggregated statistics for GitHub activity"
    columns:
      - name: stats_date
        description: "Date of the statistics"
        tests:
          - not_null
      - name: event_type
        description: "Type of event for this aggregation"
        tests:
          - not_null
      - name: total_events
        description: "Total number of events"
        tests:
          - not_null
      - name: unique_actors
        description: "Count of unique actors"
        tests:
          - not_null
      - name: unique_repos
        description: "Count of unique repositories"
      - name: business_hours_ratio
        description: "Percentage of events during business hours (9-17)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: weekend_ratio
        description: "Percentage of events on weekends"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1

  - name: repo_health
    description: "Repository health metrics and scores"
    columns:
      - name: snapshot_date
        description: "Date of the health snapshot"
        tests:
          - not_null
      - name: repo_owner
        description: "Repository owner (organization or user)"
        tests:
          - not_null
      - name: repo_name
        description: "Repository name"
        tests:
          - not_null
      - name: repo_full_name
        description: "Full repository name (owner/repo)"
        tests:
          - not_null
      - name: total_events
        description: "Total events for this repository on this date"
      - name: push_events
        description: "Count of push events"
      - name: pr_events
        description: "Count of pull request events"
      - name: overall_health_score
        description: "Calculated health score (0-100)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: health_status
        description: "Health classification (Healthy, Moderate, At Risk, Critical)"
        tests:
          - accepted_values:
              values: ['Healthy', 'Moderate', 'At Risk', 'Critical']
              quote: true

  - name: ai_agent_stats
    description: "Daily aggregated statistics for AI coding agent activity"
    columns:
      - name: stats_date
        description: "Date of the statistics"
        tests:
          - not_null
      - name: actor_type
        description: "Type of AI agent (Copilot, Claude, Cursor, CodeRabbit, Lovable, Dependabot, CI/CD Bot, Other Bot)"
        tests:
          - not_null
          - accepted_values:
              values: ['Copilot', 'Claude', 'Cursor', 'CodeRabbit', 'Lovable', 'Dependabot', 'CI/CD Bot', 'Other Bot', 'Human']
              quote: true
      - name: total_events
        description: "Total number of events by this agent type"
        tests:
          - not_null
      - name: unique_agents
        description: "Count of unique agent accounts"
        tests:
          - not_null
      - name: repos_touched
        description: "Count of unique repositories touched"
      - name: push_events
        description: "Count of push events"
      - name: pr_events
        description: "Count of pull request events"
      - name: comment_events
        description: "Count of issue comment events"
      - name: star_events
        description: "Count of star/watch events"
      - name: fork_events
        description: "Count of fork events"
      - name: avg_activity_hour
        description: "Average hour of activity (0-23)"
      - name: push_ratio
        description: "Ratio of push events to total events"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: pr_ratio
        description: "Ratio of PR events to total events"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1

  - name: ai_ratio_timeline
    description: "Daily AI vs Human ratio time-series for dashboard visualization"
    columns:
      - name: event_date
        description: "Date of the metrics"
        tests:
          - not_null
      - name: total_events
        description: "Total number of events on this date"
        tests:
          - not_null
      - name: ai_events
        description: "Count of AI agent events"
        tests:
          - not_null
      - name: human_events
        description: "Count of human events"
        tests:
          - not_null
      - name: ai_percentage
        description: "Percentage of events from AI agents (0-100)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
